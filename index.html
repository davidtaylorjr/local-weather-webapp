<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Local Weather</title>
    <link rel="stylesheet" type="text/css" href="css/stylesheet.css">
    <link rel="stylesheet" type="text/css" href="css/weather-icons.css">
    <link href="assets/images/favicon.ico" rel="icon" type="image/x-icon" />

</head>

<body onload="geoLocation()">
    <div id="alert">
    </div>
    <h1 id="pgtitle">Your Local Weather</h1>
    <div style="text-align:center;" id="locbtn">
    </div>
    <div id="out">
    </div>
    <div id="userAddress">
    </div>
    <div id="conditions">
    </div>
    <div id="variables">
    </div>
    <div id="twentyfour">
    </div>


    <div id="weathercon">


    </div>
    <div id="extended">

    </div>
    <div class="buttons">

        <button type="button" id="celsiusbtn" onclick="convertC()">°C</button>
        <button type="button" id="fahrenheitbtn" onclick="convertF()">°F</button>

    </div>
    <footer>
        <div id="weatherapi">
            <p>Weather Data provided by <a href="https://open-meteo.com/">Open-Meteo</a></p>
        </div>
        <div id="copyright">
            <p>Copyright 2026, David Taylor Jr.</p>
        </div>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="scripts/javascript.js"></script>
</body>


</html>
